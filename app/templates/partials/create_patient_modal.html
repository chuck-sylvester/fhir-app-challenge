<!-- Overlay: covers the full screen and dims the background -->
<div class="fixed inset-0 z-50">

  <!-- Backdrop: dimmed layer, click closes the modal -->
  <div
    class="fixed inset-0 bg-black/40"
    onclick="document.getElementById('modal-root').innerHTML = ''"
  ></div>

  <!-- Centering wrapper -->
  <div class="fixed inset-0 flex items-center justify-center p-4">

    <!-- Dialog panel -->
    <section
      role="dialog"
      aria-modal="true"
      aria-labelledby="create-patient-title"
      class="relative w-full max-w-lg rounded-lg bg-white shadow-xl"
    >
      <!-- Header -->
      <div class="px-6 py-4 border-b border-gray-200">
        <h2 id="create-patient-title" class="text-lg font-semibold text-gray-800">
          Create Patient
        </h2>
      </div>

      <!-- Form: hx-post sends the data, hx-target replaces modal content -->
      <form
        hx-post="/Patient"
        hx-target="#modal-root"
        hx-swap="innerHTML"
      >
        <div class="px-6 py-4 space-y-4">

          <!-- First Name -->
          <div>
            <label for="first_name" class="block text-sm font-medium text-gray-700">
              First Name <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
          </div>

          <!-- Last Name -->
          <div>
            <label for="last_name" class="block text-sm font-medium text-gray-700">
              Last Name <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
          </div>

          <!-- Gender -->
          <div>
            <label for="gender" class="block text-sm font-medium text-gray-700">
              Gender <span class="text-red-500">*</span>
            </label>
            <select
              id="gender"
              name="gender"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="">-- Select --</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>

          <!-- Birthdate -->
          <div>
            <label for="birth_date" class="block text-sm font-medium text-gray-700">
              Date of Birth <span class="text-red-500">*</span>
            </label>
            <input
              type="date"
              id="birth_date"
              name="birth_date"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
          </div>

          <!-- Phone (optional) -->
          <div>
            <label for="phone" class="block text-sm font-medium text-gray-700">
              Phone Number
            </label>
            <input
              type="tel"
              id="phone"
              name="phone"
              class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
          </div>

        </div>

        <!-- Footer: action buttons -->
        <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">

          <!-- Left: Cancel and Reset -->
          <div class="flex gap-2">
            <button
              type="button"
              onclick="document.getElementById('modal-root').innerHTML = ''"
              class="rounded-md px-4 py-2 text-sm text-gray-600 hover:bg-gray-100"
            >
              Cancel
            </button>
            <button
              type="reset"
              class="rounded-md px-4 py-2 text-sm text-gray-600 hover:bg-gray-100"
            >
              Reset
            </button>
          </div>

          <!-- Right: Save -->
          <button
            type="submit"
            class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
          >
            Save Patient
          </button>

        </div>
      </form>
    </section>
  </div>
</div>
