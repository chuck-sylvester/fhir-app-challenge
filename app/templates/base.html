<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scaled=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="icon" href="/static/image/favicon-fhir-72.ico">
    <link rel="stylesheet" href="https://kit.fontawesome.com/124182fb50.css">
  </head>
  <body class="bg-gray-100 text-gray-900">
    <!-- Lefthand side navigation -->
     <div class="flex h-screen overflow-hidden  ">
      <nav class="flex flex-col w-64 h-screen sticky top-0 bg-gray-100 border-r border-gray-300 shadow-sm px-6 py-9">
        <a href="/" class="hover:text-blue-700">
          <h2>&nbsp;<i class="fa-sharp fa-solid fa-heart-pulse fa-xl"></i>&nbsp;&nbsp;{{ title }}</h2>
        </a>
        <br><hr class="border-gray-400"><br>
        <div class="flex-1 space-y-3">
          <a
            href="/Patient/table"
            hx-get="/Patient/table"
            hx-target="#result"
            hx-swap="innerHTML"
            class="block rounded-md px-2 py-2 hover:bg-gray-300 hover:text-blue-700"
          >
            <i class="fa-regular fa-users"></i>
            &nbsp;&nbsp;Patients
          </a>
          <a
            href="/Patient"
            hx-get="/Patient"
            hx-target="#result"
            hx-swap="innerHTML"
            class="block rounded-md px-2 py-2 hover:bg-gray-300 hover:text-blue-700"
          >
            <i class="fa-regular fa-users"></i>
            &nbsp;&nbsp;Patients (json)
          </a>
          <a
            href="/Patient/xml"
            hx-get="/Patient"
            hx-target="#result"
            hx-swap="innerHTML"
            class="block rounded-md px-2 py-2 hover:bg-gray-300 hover:text-blue-700"
          >
            <i class="fa-regular fa-users"></i>
            &nbsp;&nbsp;Patients (xml)
          </a>
          <a
            href="/Patient/new"
            hx-get="/Patient/new"
            hx-target="#modal-root"
            hx-swap="innerHTML"
            class="block rounded-md px-2 py-2 hover:bg-gray-300 hover:text-blue-700"
          >
            <i class="fa-regular fa-user-plus"></i>
            &nbsp;&nbsp;Create Patient
          </a>
          <hr>
          <a
            href="/Search"
            class="block rounded-md px-2 py-2 hover:bg-gray-300 hover:text-blue-700"
          >
            <i class="fa-sharp-duotone fa-solid fa-chart-column"></i>
            &nbsp;&nbsp;Report #1
          </a>

          <a
            href="/Activity"
            class="block rounded-md px-2 py-2 hover:bg-gray-300 hover:text-blue-700"
          >
            <i class="fa-sharp-duotone fa-solid fa-chart-column"></i>
            &nbsp;&nbsp;Report #2
          </a>
        </div>
        <!-- User Info & Logout Button -->
        {% set user = request.session.get('user') %}
        {% if user %}
        <div class="py-4 border-t border-gray-400 space-y-4">
          <div class="text-base text-gray-700">
            <i class="fa-regular fa-user"></i>&nbsp;&nbsp;{{ user.name }}
          </div>
          <a href="/logout" class="block text-base text-blue-900 hover:text-red-900">
            <i class="fa-sharp fa-regular fa-arrow-right-from-bracket"></i>&nbsp;&nbsp;Logout
          </a>
        </div>
        {% endif %}
      </nav>
      <!-- Main Content -->
      <main class="min-w-0 flex-1 px-8 py-6">
        {% block content %}{% endblock %}
      </main>
     </div>

     <!-- placeholder for Create Patient modal content -->
     <div id="modal-root"></div> 
     
     <script src="/static/js/main.js"></script>
     <script>
       document.addEventListener('keydown', function(e) {
         if (e.key === 'Escape') {
           document.getElementById('modal-root').innerHTML = '';
           closePatientMenu();
         }
       });
     </script>
    </body>
</html>
