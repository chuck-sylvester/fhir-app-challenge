spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_HAPI_DB:hapi}
    username: ${POSTGRES_HAPI_USER:admin}
    password: ${POSTGRES_HAPI_PASSWORD:admin}
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: false