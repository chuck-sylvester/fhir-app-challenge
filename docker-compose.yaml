services:
  postgres:
    container_name: fac-postgres-db
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_APP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_APP_DB}
      POSTGRES_HAPI_DB: ${POSTGRES_HAPI_DB}
      POSTGRES_HAPI_USER: ${POSTGRES_HAPI_USER}
      POSTGRES_HAPI_PASSWORD: ${POSTGRES_HAPI_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_APP_USER} -d ${POSTGRES_APP_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hapi-fhir:
    container_name: fac-hapi-fhir
    depends_on:
      postgres:
        condition: service_healthy
    image: hapiproject/hapi:v7.0.0
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.default_encoding: json
      hapi.fhir.fhir_version: R4
    volumes:
      - ./hapi.application.yaml:/app/config/application.yaml
    env_file:
      - .env

  keycloak:
     container_name: fac-keycloak
     image: quay.io/keycloak/keycloak:26.0
     command: start-dev
     environment:
       KEYCLOAK_ADMIN: admin
       KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
     ports:
       - "8180:8080"
     volumes:
       - keycloak_data:/opt/keycloak/data
     healthcheck:
       test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
       interval: 30s
       timeout: 10s
       retries: 10
       start_period: 90s

volumes:
  pgdata:
  keycloak_data: